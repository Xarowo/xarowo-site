<!doctype html>
<html lang="en" class="scroll-smooth">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Official web asset for Xarowo, Polish electronic music producer, DJ, and digital artist from Wroclaw." />
    <title>Xarowo | Home</title>
    <script>
      globalThis.tailwind = globalThis.tailwind || {};
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: { electric: "#009BF8", ink: "#000000", paper: "#FFFFFF" },
            fontFamily: { display: ["Moderniz", "Inter", "Arial", "sans-serif"] },
          },
        },
      };
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../assets/site.css" />
  </head>
  <body data-page="home" class="bg-paper text-ink antialiased dark:bg-ink dark:text-paper">
    <canvas id="grain-canvas" aria-hidden="true"></canvas>

    <header class="fixed inset-x-0 top-0 z-40 border-b border-[color:var(--hairline)] bg-[color:var(--panel)] backdrop-blur-xl">
      <nav class="mx-auto flex max-w-7xl items-center justify-between px-4 py-3 sm:px-6 lg:px-8" aria-label="Primary">
        <a href="../home/" class="flex items-center gap-3" aria-label="Xarowo home">
          <img src="../assets/xarowo-mark.png" alt="" class="brand-mark h-10 w-10 object-contain" />
          <span class="font-display text-lg font-black uppercase text-electric">Xarowo</span>
        </a>
        <div class="hidden items-center gap-8 text-sm font-bold uppercase sm:flex">
          <a class="nav-link transition hover:text-electric" data-page="home" href="../home/">Home</a>
          <a class="nav-link transition hover:text-electric" data-page="music" href="../music/">Music</a>
          <a class="nav-link transition hover:text-electric" data-page="contact" href="../contact/">Contact</a>
        </div>
        <button data-theme-toggle class="x-button premium-glow grid h-11 w-11 place-items-center border border-[color:var(--fg)] bg-[color:var(--bg)] text-electric transition hover:bg-electric hover:text-white dark:border-electric" type="button" aria-label="Toggle dark mode">
          <span data-theme-icon aria-hidden="true">L</span>
        </button>
      </nav>
    </header>

    <main>
      <section class="relative min-h-[92vh] overflow-hidden pt-24">
        <div class="absolute inset-0 -z-10">
          <img src="../assets/xarowo-banner.png" alt="" class="h-full w-full object-cover opacity-[0.22] mix-blend-multiply dark:opacity-30 dark:mix-blend-screen" />
          <div class="absolute inset-0 bg-[linear-gradient(90deg,var(--bg)_0%,rgba(255,255,255,0)_44%,var(--bg)_100%)] dark:bg-[linear-gradient(90deg,var(--bg)_0%,rgba(0,0,0,0)_44%,var(--bg)_100%)]"></div>
        </div>

        <div class="mx-auto grid min-h-[calc(92vh-6rem)] max-w-7xl items-center gap-10 px-4 pb-16 sm:px-6 lg:grid-cols-[1.06fr_0.94fr] lg:px-8">
          <div class="reveal">
            <p class="premium-glow mb-5 max-w-fit border border-[color:var(--fg)] px-4 py-2 text-xs font-black uppercase text-electric dark:border-electric">
              Wroclaw, Poland // 2026
            </p>
            <h1 id="cms-hero-title" class="font-display max-w-5xl text-balance text-6xl font-black uppercase leading-[0.82] text-electric text-glow sm:text-8xl lg:text-[9rem]">
              Xarowo
            </h1>
            <p id="cms-hero-subtitle" class="mt-6 max-w-2xl text-xl font-black uppercase leading-tight text-[color:var(--fg)] sm:text-3xl">
              Electronic Music Producer • DJ • Creative Artist
            </p>
            <p class="mt-5 max-w-xl text-lg leading-8 text-[color:var(--soft-fg)]">
              Powerful Bass. Clean Production. Future Sound.
            </p>
