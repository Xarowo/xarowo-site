backend:
  name: github
  repo: Xarowo/xarowo-site
  branch: main
  base_url: https://decap-cms-oauth.vercel.app
  auth_endpoint: /api/auth

media_folder: "assets"
public_folder: "/assets"

collections:
  - name: "releases"
    label: "Releases"
    folder: "data"
    extension: "json"
    format: "json"
    create: true
    slug: "{{title}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Year", name: "year", widget: "number" }
      - { label: "Cover Image", name: "cover_image", widget: "image" }
      - { label: "Spotify Link", name: "spotify_link", widget: "string", required: false }
