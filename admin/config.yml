backend:
  name: github
  repo: Xarowo/xarowo-site
  branch: main
  base_url: https://decap-cms-oauth.vercel.app
  auth_endpoint: /api/auth

media_folder: "assets"
public_folder: "/assets"

collections:
  # 1. KOLEKCJA DO EDYCJI STAŁYCH PODSTRON (Home, Kontakt)
  - name: "pages"
    label: "Edycja Podstron"
    delete: false
    files:
      - label: "Strona Główna"
        name: "home"
        file: "data/homepage.json"
        fields:
          - { label: "Główny Nagłówek (Hero)", name: "hero_title", widget: "string" }
          - { label: "Podtekst (Hero)", name: "hero_subtitle", widget: "text" }
          - { label: "Timer - Mały Nagłówek", name: "timer_tag", widget: "string" }
          - { label: "Timer - Tytuł", name: "timer_title", widget: "string" }
          - { label: "Timer - Data", name: "timer_date", widget: "datetime" }

      - label: "Strona Kontaktowa"
        name: "contact"
        file: "data/contactpage.json"
        fields:
          - { label: "Tytuł strony", name: "title", widget: "string" }
          - { label: "Opis", name: "description", widget: "text" }
          - { label: "Adres E-mail", name: "email", widget: "string" }

  # 2. KOLEKCJA DO DODAWANIA NOWYCH RELEASÓW (MUZYKI)
  - name: "music"
    label: "Wydania (Music)"
    folder: "data/music"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{title}}"
    format: "json"
    fields:
      - { label: "Tytuł wydania", name: "title", widget: "string" }
      - { label: "Data wydania", name: "release_date", widget: "datetime", format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", time_format: false }
      - { label: "Okładka (Zdjęcie)", name: "cover", widget: "image" }
      - { label: "Link do Spotify/SoundCloud", name: "link", widget: "string" }
      - { label: "Opis / Tracklista", name: "body", widget: "markdown" }

# 3. KOLEKCJA DO EDYCJI STRONY BIO (Sociale + Audio Player)
  - name: "bio"
    label: "Strona Bio"
    delete: false
    files:
      - label: "Konfiguracja Bio"
        name: "bio_data"
        file: "data/biopage.json"
        fields:
          - { label: "Tytuł Utworu w Playerze", name: "player_title", widget: "string", hint: "np. XAROWO - UNTITLED DUB (ID)" }
          - { label: "Album / Podpis w Playerze", name: "player_album", widget: "string", hint: "np. Dubplate Special // 2026" }
          - { label: "Plik Audio (URL lub plik)", name: "player_source", widget: "file", hint: "Wgraj plik .mp3 lub wklej bezpośredni link" }
          - label: "Ikony i Linki Społecznościowe"
            name: "socials"
            widget: "list"
            allow_add: true
            fields:
              - { label: "Nazwa Platformy", name: "name", widget: "string" }
              - { label: "Pełny Link (URL)", name: "url", widget: "string" }
              - { label: "Czysty kod SVG ikony (Wnętrze path)", name: "svg", widget: "text", hint: "Wklej tutaj tylko to, co jest wewnątrz tagu <svg>...</svg>, np. <path d='...'/>" }
