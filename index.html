<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="description" content="Xarowo - Official Gateway." />
    <title>Xarowo</title>
    <link rel="canonical" href="home/" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      /* Animacja płynnego wejścia (fade-in) na start */
      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      /* Animacja gładkiego znikania (fade-out) przed przekierowaniem */
      @keyframes fadeOut {
        from { opacity: 1; }
        to { opacity: 0; }
      }
      body {
        min-height: 100dvh;
        background-color: #000000;
        padding-top: env(safe-area-inset-top, 0px);
        padding-bottom: env(safe-area-inset-bottom, 0px);
      }
      .fade-container {
        animation: fadeIn 0.6s cubic-bezier(0.25, 1, 0.5, 1) forwards;
      }
      .fade-out-active {
        animation: fadeOut 0.5s cubic-bezier(0.25, 1, 0.5, 1) forwards !important;
      }
    </style>
  </head>
  <body class="flex items-center justify-center overflow-hidden select-none">
    
    <div id="gateway-core" class="fade-container flex items-center justify-center">
      <img src="assets/xarowo-mark.png" alt="Xarowo" class="h-20 w-20 object-contain block" />
    </div>

    <script>
      const core = document.getElementById("gateway-core");

      // Po 1 sekundzie odpalamy płynny fade-out całego widoku
      setTimeout(() => {
        core.classList.add("fade-out-active");
      }, 1000);

      // Po zakończeniu animacji fade-out (łącznie 1.5s) przeskakujemy na home/
      setTimeout(() => {
        window.location.href = "home/";
      }, 1500);
    </script>
  </body>
</html>
