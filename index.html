<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="description" content="Xarowo - Official Gateway." />
    <title>Xarowo</title>
    <link rel="icon" type="image/png" href="./assets/favicon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="./assets/favicon.png" />

    <meta property="og:title" content="Xarowo | Official Web Asset" />
    <meta property="og:description" content="Official platform for Xarowo – electronic music producer, DJ, and digital artist from Wrocław." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://xarowo.com/" />

    <meta property="og:image" content="https://xarowo.com/assets/favicon.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="512" />
    <meta property="og:image:height" content="512" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Xarowo | Official Web Asset" />
    <meta name="twitter:description" content="Official platform for Xarowo – electronic music producer, DJ, and digital artist." />
    <meta name="twitter:image" content="https://xarowo.com/assets/favicon.png" />
    
    <link rel="canonical" href="https://xarowo.com/home/" />
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }
      @keyframes fadeOut {
        from { opacity: 1; }
        to { opacity: 0; }
      }
      body {
        min-height: 100dvh;
        background-color: #000000;
        padding-top: env(safe-area-inset-top, 0px);
        padding-bottom: env(safe-area-inset-bottom, 0px);
      }
      .fade-container {
        animation: fadeIn 0.6s cubic-bezier(0.25, 1, 0.5, 1) forwards;
      }
      .fade-out-active {
        animation: fadeOut 0.4s cubic-bezier(0.25, 1, 0.5, 1) forwards !important;
      }
    </style>
  </head>
  <body style="background-color: #000000;" class="bg-black flex items-center justify-center overflow-hidden select-none">
    
    <div id="gateway-core" class="fade-container flex items-center justify-center">
      <img src="assets/xarowo-mark.png" alt="Xarowo" class="h-20 w-20 sm:h-44 sm:w-44 object-contain block" />
    </div>

    <script>
      const core = document.getElementById("gateway-core");

      // Szybki fade-out po 0.8 sekundy
      setTimeout(() => {
        core.classList.add("fade-out-active");
      }, 800);

      // Przekierowanie po 1.2 sekundy
      setTimeout(() => {
        window.location.href = "home/";
      }, 1200);
    </script>
  </body>
</html>
