    <style>
      @keyframes pulseGlow {
        0%, 100% { transform: scale(1); filter: drop-shadow(0 0 15px rgba(0, 155, 248, 0.35)); opacity: 0.9; }
        50% { transform: scale(1.02); filter: drop-shadow(0 0 30px rgba(0, 155, 248, 0.7)); opacity: 1; }
      }
      @keyframes loadProgress {
        0% { width: 0%; }
        100% { width: 100%; }
      }
      .animate-pulse-glow {
        animation: pulseGlow 2s infinite ease-in-out;
      }
      .animate-progress {
        animation: loadProgress 1.6s cubic-bezier(0.25, 1, 0.5, 1) forwards;
      }

        background-color: #000000;
        padding-top: env(safe-area-inset-top, 0px);
        padding-bottom: env(safe-area-inset-bottom, 0px);
      }
    </style>
