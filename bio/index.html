      /* Zaawansowany Liquid Glass dla głównej karty profilowej */
      .profile-perspective {
        perspective: 1500px;
      }
      .glass-profile-card {
        transition: transform 0.25s cubic-bezier(0.25, 1, 0.5, 1), border-color 0.3s ease, box-shadow 0.3s ease;
        transform-style: preserve-3d;
        will-change: transform;
      }
      .glass-profile-card:hover {
        box-shadow: 0 25px 60px rgba(0, 155, 248, 0.18);
      }
      .card-glare {
        position: absolute;
        inset: 0;
        background: radial-gradient(circle 300px at var(--x, 50%) var(--y, 50%), rgba(255, 255, 255, 0.1), transparent 80%);
        z-index: 5;
        pointer-events: none;
        transition: opacity 0.3s ease;
        opacity: 0;
      }
      .glass-profile-card:hover .card-glare {
        opacity: 1;
      }
      /* Animacja pulsującego tła sygnału */
      @keyframes radar-pulse {
        0% { transform: scale(0.95); opacity: 0.5; }
        50% { transform: scale(1.1); opacity: 0.1; }
        100% { transform: scale(1.3); opacity: 0; }
      }
      .radar-glow {
        animation: radar-pulse 3s infinite cubic-bezier(0.215, 0.610, 0.355, 1);
      }
      /* Liquid Aura Drift - Płynny ruch luksusowego światła w tle */
      @keyframes aura-drift {
        0% { transform: translate(-30%, -30%) rotate(0deg) scale(1); }
        33% { transform: translate(20%, 10%) rotate(120deg) scale(1.2); }
        66% { transform: translate(-10%, 40%) rotate(240deg) scale(0.9); }
        100% { transform: translate(-30%, -30%) rotate(360deg) scale(1); }
      }
      .bg-aura-blur {
        position: absolute;
        width: 600px;
        height: 600px;
        background: radial-gradient(circle, rgba(0, 155, 248, 0.15) 0%, transparent 70%);
        top: 20%;
        left: 20%;
        filter: blur(80px);
        animation: aura-drift 20s infinite alternate ease-in-out;
        will-change: transform;
      }

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const card = document.querySelector(".glass-profile-card");
        if (!card) return;

        const isTouchDevice = 'ontouchstart' in window || navigator.maxTouchPoints > 0;

        card.addEventListener("mousemove", (e) => {
          if (isTouchDevice) return;

          const rect = card.getBoundingClientRect();
          const x = e.clientX - rect.left;
          const y = e.clientY - rect.top;
          
          const centerX = rect.width / 2;
          const centerY = rect.height / 2;
          
          const maxTilt = 3; 
          const tiltX = ((centerY - y) / centerY) * maxTilt;
          const tiltY = ((x - centerX) / centerX) * maxTilt;
          
          card.style.transform = `rotateX(${tiltX}deg) rotateY(${tiltY}deg) scale(1.01)`;
          
          card.style.setProperty('--x', `${x}px`);
          card.style.setProperty('--y', `${y}px`);
        });

        card.addEventListener("mouseleave", () => {
          card.style.transform = "rotateX(0deg) rotateY(0deg) scale(1)";
        });
      });
