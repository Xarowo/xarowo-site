<!doctype html>
<html lang="en" class="scroll-smooth dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="description" content="Xarowo | Digital Identity Hub." />
    <title>Xarowo | Bio</title>
    <script>
      globalThis.tailwind = globalThis.tailwind || {};
      tailwind.config = { darkMode: "class", theme: { extend: { colors: { electric: "#009BF8", ink: "#000000", paper: "#FFFFFF" }, fontFamily: { display: ["Moderniz", "Inter", "Arial", "sans-serif"] } } } };
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../assets/site.css" />
    <style>
      body {
        overflow-x: hidden;
        min-height: 100dvh;
        padding-top: env(safe-area-inset-top, 0px);
        padding-bottom: env(safe-area-inset-bottom, 0px);
      }
      .profile-perspective { perspective: 1500px; }
      .glass-profile-card {
        transition: transform 0.25s cubic-bezier(0.25, 1, 0.5, 1), border-color 0.3s ease, box-shadow 0.3s ease;
        transform-style: preserve-3d;
        will-change: transform;
      }
      .glass-profile-card:hover { box-shadow: 0 25px 60px rgba(0, 155, 248, 0.18); }
      .card-glare {
        position: absolute;
        inset: 0;
        background: radial-gradient(circle 300px at var(--x, 50%) var(--y, 50%), rgba(255, 255, 255, 0.1), transparent 80%);
        z-index: 5;
        pointer-events: none;
        transition: opacity 0.3s ease;
        opacity: 0;
      }
      .glass-profile-card:hover .card-glare { opacity: 1; }
      @keyframes radar-pulse {
        0% { transform: scale(0.95); opacity: 0.5; }
        50% { transform: scale(1.1); opacity: 0.1; }
        100% { transform: scale(1.3); opacity: 0; }
      }
      .radar-glow { animation: radar-pulse 3s infinite cubic-bezier(0.215, 0.610, 0.355, 1); }
      @keyframes aura-drift {
        0% { transform: translate(-30%, -30%) rotate(0deg) scale(1); }
        33% { transform: translate(20%, 10%) rotate(120deg) scale(1.2); }
        66% { transform: translate(-10%, 40%) rotate(240deg) scale(0.9); }
        100% { transform: translate(-30%, -30%) rotate(360deg) scale(1); }
      }
      .bg-aura-blur {
        position: absolute;
        width: 600px;
        height: 600px;
        background: radial-gradient(circle, rgba(0, 155, 248, 0.15) 0%, transparent 70%);
        top: 20%;
        left: 20%;
        filter: blur(80px);
        animation: aura-drift 20s infinite alternate ease-in-out;
        will-change: transform;
      }
    </style>
  </head>
  <body data-page="bio" class="bg-ink text-paper antialiased flex flex-col justify-center items-center min-h-screen relative p-4 sm:p-6 lg:p-8 overflow-hidden">
    <div class="bg-aura-blur pointer-events-none"></div>
    <div class="absolute inset-0 bg-[radial-gradient(circle_at_center,transparent_40%,#000000_95%)] pointer-events-none"></div>
    <canvas id="grain-canvas" aria-hidden="true"></canvas>

    <div class="profile-perspective w-full max-w-3xl z-10 my-auto">
      <div class="glass-profile-card relative overflow-hidden border border-zinc-800/80 bg-zinc-950/75 backdrop-blur-2xl rounded-3xl p-6 sm:p-12 text-center hover:border-electric/50">
        <div class="card-glare"></div>

        <div class="relative z-10 flex flex-col items-center">
          <div class="relative mb-6 group">
            <div class="radar-glow absolute inset-0 bg-electric rounded-full -z-10"></div>
            <div class="absolute inset-0 bg-electric/20 rounded-full blur-md"></div>
            <img src="../assets/xarowo-mark.png" alt="Xarowo Logomark" class="relative z-10 h-28 w-28 sm:h-32 sm:w-32 object-contain aspect-square transition-transform duration-700 ease-out transform group-hover:rotate-[360deg]" />
          </div>

          <h1 class="font-display text-4xl sm:text-6xl uppercase font-black tracking-tighter text-white leading-none text-glow">
            XAROWO
          </h1>
          
          <div class="mt-3 flex items-center gap-2 bg-zinc-900/90 border border-zinc-800 px-3 py-1 rounded-full">
            <span class="h-2 w-2 rounded-full bg-electric animate-pulse"></span>
            <span class="text-[10px] font-black uppercase tracking-widest text-zinc-400">Wroclaw // Audio Signal Active</span>
          </div>

          <p class="mt-4 max-w-md text-xs sm:text-sm text-zinc-400 leading-relaxed font-medium">
            Electronic music producer, DJ, and digital artist. Exploring heavy-duty low end grids and raw visual concepts.
          </p>
        </div>

        <hr class="border-zinc-900 my-8 max-w-xs mx-auto relative z-10" />

        <div class="relative z-10 max-w-md mx-auto bg-zinc-900/40 border border-zinc-800/80 rounded-2xl p-4 flex items-center gap-4 text-left backdrop-blur-md mb-4">
          <button id="player-play-btn" class="h-12 w-12 flex items-center justify-center bg-electric hover:bg-white text-white hover:text-ink rounded-full transition-colors flex-shrink-0">
            <svg id="play-icon" class="h-5 w-5 fill-current" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
            <svg id="pause-icon" class="h-5 w-5 fill-current hidden" viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
          </button>
          <div class="flex-1 min-w-0">
            <span id="player-track-title" class="block text-xs font-black uppercase tracking-wide text-white truncate">Syncing feed...</span>
            <span id="player-track-album" class="block text-[10px] font-bold text-zinc-500 uppercase tracking-wider truncate">Xarowo Grid</span>
            <div class="w-full bg-zinc-800 h-1 rounded-full mt-2 overflow-hidden cursor-pointer" id="player-progress-container">
              <div id="player-progress-bar" class="bg-electric h-full w-0 transition-all duration-100"></div>
            </div>
          </div>
          <audio id="audio-element" preload="none"></audio>
        </div>

        <div class="mt-8 relative z-10 max-w-sm mx-auto">
          <a href="../music/" class="premium-glow flex items-center justify-center gap-3 w-full border border-electric bg-electric px-6 py-4 text-xs sm:text-sm font-black uppercase text-white transition duration-300 hover:bg-transparent hover:text-electric rounded-xl">
            <span>Enter Main Music Experience</span>
            <span class="text-base">→</span>
          </a>
        </div>

      </div>
    </div>

    <footer class="absolute bottom-4 text-center text-[10px] font-bold text-zinc-700 tracking-widest z-10 uppercase">
      © 2026 Xarowo // Protected Digital Hub
    </footer>

    <script src="../assets/site.js"></script>
    <script>
      document.addEventListener("DOMContentLoaded", async () => {
        const audio = document.getElementById("audio-element");
        const playBtn = document.getElementById("player-play-btn");
        const playIcon = document.getElementById("play-icon");
        const pauseIcon = document.getElementById("pause-icon");
        const trackTitle = document.getElementById("player-track-title");
        const trackAlbum = document.getElementById("player-track-album");
        const progressBar = document.getElementById("player-progress-bar");
        const progressContainer = document.getElementById("player-progress-container");

        try {
          const response = await fetch('../data/biopage.json');
          if (!response.ok) throw new Error("CMS data file missing");
          const cmsData = await response.json();

          // Podłączenie danych playera audio z CMS
          if (cmsData.player_source) {
            audio.src = cmsData.player_source;
            trackTitle.textContent = cmsData.player_title || "Untitled Track";
            trackAlbum.textContent = cmsData.player_album || "Xarowo Records";

            playBtn.addEventListener("click", () => {
              if (audio.paused) {
                audio.play();
                playIcon.classList.add("hidden");
                pauseIcon.classList.remove("hidden");
              } else {
                audio.pause();
                playIcon.classList.remove("hidden");
                pauseIcon.classList.add("hidden");
              }
            });

            audio.addEventListener("timeupdate", () => {
              const progress = (audio.currentTime / audio.duration) * 100;
              progressBar.style.width = `${progress}%`;
            });

            progressContainer.addEventListener("click", (e) => {
              const rect = progressContainer.getBoundingClientRect();
              const clickX = e.clientX - rect.left;
              audio.currentTime = (clickX / rect.width) * audio.duration;
            });
          } else {
            trackTitle.textContent = "Player offline";
          }

        } catch (err) {
          console.error("CMS Sync Error:", err);
          trackTitle.textContent = "Sync failed // Verify biopage.json";
        }

        // Efekt Tilt 3D dla PC
        const card = document.querySelector(".glass-profile-card");
        if (card && !('ontouchstart' in window || navigator.maxTouchPoints > 0)) {
          card.addEventListener("mousemove", (e) => {
            const rect = card.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            const centerX = rect.width / 2;
            const centerY = rect.height / 2;
            card.style.transform = `rotateX(${((centerY - y) / centerY) * 3}deg) rotateY(${((x - centerX) / centerX) * 3}deg) scale(1.01)`;
            card.style.setProperty('--x', `${x}px`);
            card.style.setProperty('--y', `${y}px`);
          });
          card.addEventListener("mouseleave", () => {
            card.style.transform = "rotateX(0deg) rotateY(0deg) scale(1)";
          });
        }
      });
    </script>
  </body>
</html>
